<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radeem App - Redeem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
</head>
<body>
    <main>
        <div class="container">
            <h1>Redeem Coins</h1>
            <p class="text-center">Exchange your coins for real rewards!</p>

            <div class="balance-card">
                <div class="balance-item">
                    <i data-lucide="coins"></i>
                    <span>Your Coins</span>
                    <strong id="user-coins">0</strong>
                </div>
            </div>

            <div class="card" style="margin-top: 2rem;">
                <div class="card-header">Redeem 10 Rupees</div>
                <div class="card-content">
                    <p>Cost: <strong>900 Coins</strong></p>
                    <button id="redeem-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        <i data-lucide="gift"></i>&nbsp; Redeem Now
                    </button>
                </div>
            </div>

            <h2 style="margin-top: 2.5rem; text-align: left;">Redeem History</h2>
            <div id="redeem-history-list" class="redeem-history-list">
                <p class="text-light" style="text-align: center;" id="no-history-message">No redeem requests yet.</p>
            </div>

        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i data-lucide="home"></i>
            <span>Home</span>
        </a>
        <a href="earn.html" class="nav-item">
            <i data-lucide="megaphone"></i>
            <span>Earn</span>
        </a>
        <a href="mystery-box.html" class="nav-item">
            <i data-lucide="box"></i>
            <span>Mystery Box</span>
        </a>
        <a href="redeem.html" class="nav-item active">
            <i data-lucide="gift"></i>
            <span>Redeem</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i data-lucide="user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script type="module">
        import { getCurrentUser } from './auth.js';
        import { getUserData, updateUserBalances, addRedeemRequest, getRedeemHistory } from './database.js';
        import { showToast, updateBalanceDisplay } from './app.js';

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();

            const redeemBtn = document.getElementById('redeem-btn');
            const redeemHistoryList = document.getElementById('redeem-history-list');
            const noHistoryMessage = document.getElementById('no-history-message');

            const REDEEM_COST_COINS = 900;
            const REDEEM_AMOUNT_RUPEES = 10;

            let userData = null;
            let currentUserID = null;

            const user = await getCurrentUser();
            if (!user) { return; } // auth.js will redirect if no user
            currentUserID = user.uid;

            getUserData(currentUserID, (data) => {
                if (data) {
                    userData = data;
                    updateBalanceDisplay(data.coins, data.diamonds);
                }
            });

            getRedeemHistory(currentUserID, (requests) => {
                redeemHistoryList.innerHTML = ''; // Clear previous entries
                if (requests.length === 0) {
                    noHistoryMessage.style.display = 'block';
                    redeemHistoryList.appendChild(noHistoryMessage);
                } else {
                    noHistoryMessage.style.display = 'none';
                    requests.forEach(request => {
                        const redeemItem = document.createElement('div');
                        redeemItem.className = 'redeem-item';
                        redeemItem.innerHTML = `
                            <div class="redeem-item-info">
                                <strong>${request.amount} Rupees Redeem</strong>
                                <span>Used ${request.coinsUsed} Coins | ${new Date(request.createdAt).toLocaleDateString()}</span>
                            </div>
                            <span class="redeem-status ${request.status}">${request.status.charAt(0).toUpperCase() + request.status.slice(1)}</span>
                        `;
                        redeemHistoryList.appendChild(redeemItem);
                    });
                }
            });

            redeemBtn.addEventListener('click', async () => {
                if (!userData || redeemBtn.disabled) return;

                if (userData.coins < REDEEM_COST_COINS) {
                    showToast('Not enough coins to redeem!', 'error');
                    return;
                }

                redeemBtn.disabled = true;

                const newCoins = userData.coins - REDEEM_COST_COINS;

                try {
                    // Deduct coins
                    const balanceUpdateResult = await updateUserBalances(currentUserID, newCoins, userData.diamonds);

                    if (!balanceUpdateResult.success) {
                        throw new Error(balanceUpdateResult.error || 'Failed to update balance');
                    }

                    // Add redeem request
                    const requestResult = await addRedeemRequest(currentUserID, user.email, REDEEM_COST_COINS, REDEEM_AMOUNT_RUPEES);

                    if (!requestResult.success) {
                        throw new Error(requestResult.error || 'Failed to create redeem request');
                    }

                    userData.coins = newCoins; // Update local state
                    updateBalanceDisplay(userData.coins, userData.diamonds); // Update UI
                    showToast('Redeem request submitted!', 'success');

                } catch (error) {
                    console.error('Redeem process failed:', error);
                    showToast('Redeem failed: ' + error.message, 'error');
                }

                redeemBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
