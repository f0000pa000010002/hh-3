<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radeem App - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <h1>Radeem App</h1>
            <h2>Register</h2>

            <div id="auth-message" class="alert" style="display: none;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" placeholder="Your Username" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" placeholder="********" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>
            </form>

            <div class="form-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { registerUser } from './auth.js';
        import { showToast } from './app.js';

        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('register-form');
            const authMessage = document.getElementById('auth-message');

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = registerForm['register-username'].value;
                const email = registerForm['register-email'].value;
                const password = registerForm['register-password'].value;

                const registerBtn = registerForm.querySelector('button[type="submit"]');
                registerBtn.disabled = true;
                authMessage.style.display = 'none';

                const result = await registerUser(email, password, username);
                if (result.success) {
                    showToast('Registration successful! Redirecting to dashboard...', 'success');
                    // Redirect handled by auth.js onAuthStateChanged listener
                } else {
                    authMessage.textContent = result.error;
                    authMessage.className = 'alert alert-error';
                    authMessage.style.display = 'block';
                    showToast(result.error, 'error');
                }
                registerBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
