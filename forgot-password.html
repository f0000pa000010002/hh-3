<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radeem App - Reset Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <h1>Radeem App</h1>
            <h2>Reset Password</h2>

            <div id="auth-message" class="alert" style="display: none;"></div>

            <form id="reset-password-form">
                <div class="form-group">
                    <label for="reset-email">Email</label>
                    <input type="email" id="reset-email" placeholder="your@email.com" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Send Reset Email</button>
                </div>
            </form>

            <div class="form-link">
                Remembered your password? <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { resetPassword } from './auth.js';
        import { showToast } from './app.js';

        document.addEventListener('DOMContentLoaded', () => {
            const resetPasswordForm = document.getElementById('reset-password-form');
            const authMessage = document.getElementById('auth-message');

            resetPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = resetPasswordForm['reset-email'].value;

                const resetBtn = resetPasswordForm.querySelector('button[type="submit"]');
                resetBtn.disabled = true;
                authMessage.style.display = 'none';

                const result = await resetPassword(email);
                if (result.success) {
                    authMessage.textContent = result.message;
                    authMessage.className = 'alert alert-success';
                    authMessage.style.display = 'block';
                    showToast(result.message, 'success');
                } else {
                    authMessage.textContent = result.error;
                    authMessage.className = 'alert alert-error';
                    authMessage.style.display = 'block';
                    showToast(result.error, 'error');
                }
                resetBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
