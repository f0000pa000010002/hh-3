<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radeem App - Earn Diamonds</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
</head>
<body>
    <main>
        <div class="container">
            <h1>Earn Diamonds</h1>
            <p>Watch a short ad to earn <strong>1 Diamond</strong>!</p>

            <div class="balance-card">
                <div class="balance-item">
                    <i data-lucide="gem"></i>
                    <span>Your Diamonds</span>
                    <strong id="user-diamonds">0</strong>
                </div>
            </div>

            <button id="watch-ad-btn" class="btn btn-secondary" style="width: 100%; margin-top: 2rem;">
                <i data-lucide="tv"></i>&nbsp; Watch Ad (Get 1 Diamond)
            </button>

            <div id="loading-ad" class="loading-spinner"></div>

            <div id="reward-animation" class="reward-animation">
                <div class="reward-icon"><i data-lucide="gem"></i></div>
                <div class="reward-text">+1 Diamond!</div>
            </div>

        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i data-lucide="home"></i>
            <span>Home</span>
        </a>
        <a href="earn.html" class="nav-item active">
            <i data-lucide="megaphone"></i>
            <span>Earn</span>
        </a>
        <a href="mystery-box.html" class="nav-item">
            <i data-lucide="box"></i>
            <span>Mystery Box</span>
        </a>
        <a href="redeem.html" class="nav-item">
            <i data-lucide="gift"></i>
            <span>Redeem</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i data-lucide="user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script type="module">
        import { getCurrentUser } from './auth.js';
        import { getUserData, updateUserBalances } from './database.js';
        import { showLoading, showToast, updateBalanceDisplay } from './app.js';

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();

            const watchAdBtn = document.getElementById('watch-ad-btn');
            const loadingAd = document.getElementById('loading-ad');
            const rewardAnimation = document.getElementById('reward-animation');
            let userData = null;
            let currentUserID = null;

            const user = await getCurrentUser();
            if (!user) { return; } // auth.js will redirect if no user
            currentUserID = user.uid;

            getUserData(currentUserID, (data) => {
                if (data) {
                    userData = data;
                    updateBalanceDisplay(data.coins, data.diamonds);
                }
            });

            watchAdBtn.addEventListener('click', async () => {
                if (!userData || watchAdBtn.disabled) return;

                watchAdBtn.disabled = true;
                showLoading('loading-ad', true);
                rewardAnimation.classList.remove('active');

                // Simulate ad watching for 3 seconds
                await new Promise(resolve => setTimeout(resolve, 3000));

                showLoading('loading-ad', false);

                const newDiamonds = userData.diamonds + 1;
                const result = await updateUserBalances(currentUserID, userData.coins, newDiamonds);

                if (result.success) {
                    userData.diamonds = newDiamonds;
                    updateBalanceDisplay(userData.coins, userData.diamonds);
                    rewardAnimation.classList.add('active');
                    showToast('+1 Diamond earned!', 'success');

                    // Hide reward animation after a few seconds
                    setTimeout(() => {
                        rewardAnimation.classList.remove('active');
                    }, 2000);
                } else {
                    showToast('Failed to award diamond: ' + result.error, 'error');
                }

                watchAdBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
